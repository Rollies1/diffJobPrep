spring:
  application:
    name: questionservice

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jobprep}
    username: ${DATABASE_USER:jobprep}
    password: ${DATABASE_PASSWORD:devpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        default_schema: question

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: question
    schemas: question
    create-schemas: true

server:
  port: 8083

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-your-256-bit-secret-your-256-bit-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.knust.codequest.questionservice: ${LOG_LEVEL:INFO}
