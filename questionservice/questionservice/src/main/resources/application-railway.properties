# Database (Railway injects these automatically, fallbacks for local)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jobprep}
spring.datasource.username=${PGUSER:jobprep}
spring.datasource.password=${PGPASSWORD:jobprep}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# API prefix
server.servlet.context-path=/api

# Connection pool (tuned for Railway's connection limits)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# JWT (must match authservice secret - set in Railway UI)
jwt.secret=${JWT_SECRET}
