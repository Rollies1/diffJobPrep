# =============================================================
# Flyway configuration example for JobPrep QuestionService
# =============================================================
# Copy to flyway.conf and edit. Or override any value via env vars
# prefixed with FLYWAY_ (e.g., FLYWAY_URL=jdbc:postgresql://...).
# Docs: https://documentation.red-gate.com/fd/configuration-227004929.html
# =============================================================

# --- Database connection -------------------------------------
flyway.url=jdbc:postgresql://localhost:5432/question_db
flyway.user=jobprep
flyway.password=jobprep

# --- Where to find migrations --------------------------------
# Can be a comma-separated list. classpath:db/migration is the
# Spring Boot default; filesystem: is useful for CLI runs.
flyway.locations=filesystem:db/migration

# --- Schema / table naming -----------------------------------
flyway.defaultSchema=public
flyway.schemas=public

# --- Behavior ------------------------------------------------
# Baseline an existing DB (with no flyway_schema_history) at V1
# so the migrations can be applied to a non-empty database.
flyway.baseline-on-migrate=false
flyway.baseline-version=0

# Validate SQL checksums before applying (fail fast on tampering).
flyway.validateOnMigrate=true

# Run migrations inside a single transaction per version.
flyway.executeInTransaction=true

# --- Output --------------------------------------------------
flyway.cleanDisabled=true
flyway.outOfOrder=false
