spring:
  application:
    name: practice-service-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

app:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:4200"

ai-service:
  url: http://localhost:8084/ai/evaluate
