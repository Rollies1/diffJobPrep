spring:
  application:
    name: practiceservice

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jobprep}
    username: ${DATABASE_USER:jobprep}
    password: ${DATABASE_PASSWORD:devpassword}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: practice

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: practice
    schemas: practice
    create-schemas: true

# ─── Idempotency config ───
idempotency:
  # Keys expire after this many hours. Pruned by a scheduled task or
  # by the cron endpoint in sessionservice.
  ttl-hours: 24
  # Max key length (client-supplied UUID recommended).
  max-key-length: 128

# ─── Inter-service URLs ───
# Downstream services practiceservice calls directly (bypassing the gateway).
services:
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8084}
  question:
    base-url: ${QUESTION_SERVICE_URL:http://localhost:8083}
  session:
    base-url: ${SESSION_SERVICE_URL:http://localhost:8087}
  shared-secret: ${SERVICE_SHARED_SECRET:dev-internal-key}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-your-256-bit-secret-your-256-bit-secret}

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.knust.codequest.practiceservice: ${LOG_LEVEL:INFO}

