name: ai-service CI/CD

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'aiservice/aiservice/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'aiservice/aiservice/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aiservice/aiservice
        
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven and Run Tests
      run: mvn clean verify
      
    - name: Build Docker Image
      run: docker build -t knustcodequest/aiservice:${{ github.sha }} .
      
    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Push Docker Image
      if: github.event_name == 'push'
      run: |
        docker push knustcodequest/aiservice:${{ github.sha }}
        docker tag knustcodequest/aiservice:${{ github.sha }} knustcodequest/aiservice:latest
        docker push knustcodequest/aiservice:latest
