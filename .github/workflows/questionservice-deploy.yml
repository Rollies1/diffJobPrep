name: Question Service Deploy

on:
  workflow_run:
    workflows: ["Question Service Docker Build"]
    branches: [main]
    types: [completed]

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          helm upgrade --install questionservice ./questionservice/questionservice/helm \
            --namespace staging \
            --create-namespace \
            --set image.tag=${{ github.event.workflow_run.head_sha }} \
            --wait --timeout 5m
