name: AuthService SonarQube

on:
  push:
    branches: [ "main" ]
    paths:
      - 'authservice/**'

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: SonarQube Scan
      working-directory: ./authservice/authservice
      run: echo "Running SonarQube Scan"
