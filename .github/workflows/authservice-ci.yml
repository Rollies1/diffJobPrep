name: AuthService CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'authservice/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'authservice/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./authservice/authservice

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean verify
