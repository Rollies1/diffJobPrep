version: 2

updates:
  - package-ecosystem: "maven"
    directory: "/sessionservice"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "codequest/backend-team"
    labels:
      - "dependencies"
      - "sessionservice"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
      testcontainers:
        patterns:
          - "org.testcontainers:*"
      test-frameworks:
        patterns:
          - "org.junit.jupiter:*"
          - "org.mockito:*"
          - "org.assertj:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
