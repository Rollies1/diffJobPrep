spring:
  application:
    name: sessionservice
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobprep}
    username: ${SPRING_DATASOURCE_USERNAME:jobprep}
    password: ${SPRING_DATASOURCE_PASSWORD:devpassword}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

scheduler:
  streak:
    cron: "0 0 * * * *"

cron:
  secret: devsecret

