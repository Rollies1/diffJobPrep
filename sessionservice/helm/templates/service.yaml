apiVersion: v1
kind: Service
metadata:
  name: sessionservice
  namespace: codequest
  labels:
    app: sessionservice
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: management
      protocol: TCP
      name: management
  selector:
    app: sessionservice
