apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sessionservice
  namespace: codequest
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sessionservice.codequest.knust.edu
      secretName: sessionservice-tls
  rules:
    - host: sessionservice.codequest.knust.edu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sessionservice
                port:
                  number: 80
